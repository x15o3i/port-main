<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Callback | Raphael Fulfilled</title>
    <link rel="icon" type="image/svg+xml" href="images/favicon.png">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #fafafa;
            color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            max-width: 400px;
            padding: 3rem 2rem;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 12px 32px -4px rgba(108, 63, 197, 0.08);
            border: 1px solid rgba(237, 233, 254, 0.6);
        }
        h2 {
            margin-top: 0;
            margin-bottom: 0.5rem;
            color: #6C3FC5;
            font-size: 1.5rem;
        }
        p {
            color: #828282;
            margin-bottom: 0;
        }
        .loader {
            border: 4px solid #f4f0ff;
            border-top: 4px solid #6C3FC5;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            animation: spin 1s linear infinite;
            margin: 2rem auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Connecting to Spotify...</h2>
        <div class="loader"></div>
        <p>Authenticating and redirecting you back.</p>
    </div>

    <script>
        window.onload = function() {
            // Function to parse hash fragments (Implicit Grant Flow)
            const hashParams = window.location.hash
                .substring(1)
                .split('&')
                .reduce(function (initial, item) {
                    if (item) {
                        var parts = item.split('=');
                        initial[parts[0]] = decodeURIComponent(parts[1]);
                    }
                    return initial;
                }, {});
                
            // Function to parse query parameters (Authorization Code Flow)
            const queryParams = new URLSearchParams(window.location.search);
            const authCode = queryParams.get('code');
            const error = queryParams.get('error');

            if (hashParams.access_token) {
                // Implicit Grant Flow: We got the access token directly
                // Calculate absolute expiration time
                const expiresAt = new Date().getTime() + (parseInt(hashParams.expires_in, 10) * 1000);
                
                localStorage.setItem('spotify_access_token', hashParams.access_token);
                localStorage.setItem('spotify_token_expires_at', expiresAt);
                
                // Navigate back home immediately
                window.location.replace('index.html');
                
            } else if (authCode) {
                // PKCE / Auth Code Flow: Save the code to exchange for a token
                localStorage.setItem('spotify_auth_code', authCode);
                window.location.replace('index.html');
                
            } else if (error) {
                console.error('Spotify Authorization Error:', error);
                document.querySelector('h2').textContent = 'Authentication Failed';
                document.querySelector('h2').style.color = '#e34f26';
                document.querySelector('p').textContent = 'Redirecting back...';
                document.querySelector('.loader').style.borderTopColor = '#e34f26';
                
                setTimeout(() => {
                    window.location.replace('index.html');
                }, 2500);
            } else {
                // If accessed directly without parameters, return home
                window.location.replace('index.html');
            }
        };
    </script>
</body>
</html>
